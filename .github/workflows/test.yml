name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "tools/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - ".github/workflows/test.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html

      - name: Lint
        run: make lint

  test-go:
    runs-on: ubuntu-latest
    name: Go Tests

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3

      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html

      - name: Run Go tests
        env:
          CGO_ENABLED: "0"
        run: make test-go

  test-frontend:
    runs-on: ubuntu-latest
    name: Frontend Tests (${{ matrix.shard }})

    strategy:
      matrix:
        shard: [1/3, 2/3, 3/3]

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v3

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        run: cd frontend && pnpm install

      - name: Create frontend dist placeholder
        run: mkdir -p frontend/dist && echo '<html></html>' > frontend/dist/index.html

      - name: Generate Wails bindings
        run: wails generate module

      - name: Run unit tests
        run: cd frontend && pnpm vitest run --shard ${{ matrix.shard }}

      - name: Run integration tests
        if: matrix.shard == '1/3'
        run: make test-integration
